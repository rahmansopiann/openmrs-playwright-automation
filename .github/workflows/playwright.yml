name: Playwright Tests with Allure

on:
  # Manual trigger
   workflow_dispatch:
    inputs:
      feature:
        description: 'Feature name to test'
        required: false
        default: 'all'
      telegram_chat_id:
        description: 'Telegram Chat ID'
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Install Allure CLI
        run: |
          npm install -g allure-commandline
          allure --version

      - name: Set Feature Variable
        run: |
          # Ambil dari repository_dispatch atau workflow_dispatch
          FEATURE="${{ github.event.client_payload.feature || github.event.inputs.feature || 'all' }}"
          echo "FEATURE=$FEATURE" >> $GITHUB_ENV
          echo "Running tests for feature: $FEATURE"

      - name: Run Playwright Tests
        run: |
          mkdir -p allure-results test-results
          
          if [ "$FEATURE" = "all" ]; then
            npx playwright test
          else
            npx playwright test --grep "@$FEATURE"
          fi
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          CI: true
        continue-on-error: true  # Lanjutkan meski ada test failure

      - name: Generate Allure Report
        if: always()
        run: |
          allure generate allure-results --clean -o allure-report
          echo "Allure report generated"

      - name: Upload Allure Results (JSON)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_id }}
          path: allure-results/
          retention-days: 30

      - name: Upload Allure Report (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_id }}
          path: allure-report/
          retention-days: 30

      - name: Upload Test Results JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-json-${{ github.run_id }}
          path: test-results/results.json
          retention-days: 30

      - name: Debug - Check Allure Files
        if: always()
        run: |
          echo "=== FEATURE ==="
          echo "$FEATURE"
          echo "=== allure-report/widgets/ ==="
          ls -la allure-report/widgets/ 2>/dev/null || echo "❌ Not found"
          echo "=== summary.json ==="
          cat allure-report/widgets/summary.json 2>/dev/null || echo "❌ Not found"
        env:
          FEATURE: ${{ env.FEATURE }}

      # Parse hasil dan kirim ke n8n webhook
      - name: Parse & Send Results to n8n
        if: always()
        run: |
          python3 << 'EOF'
          import json
          import os
          import urllib.request
          import urllib.error

          # ── Baca environment variables ──────────────────────────
          feature         = os.environ.get("FEATURE", "all")
          run_id          = os.environ.get("GITHUB_RUN_ID", "")
          run_number      = os.environ.get("GITHUB_RUN_NUMBER", "")
          repository      = os.environ.get("GITHUB_REPOSITORY", "")
          n8n_url         = os.environ.get("N8N_WEBHOOK_RESULTS_URL", "")
          telegram_chat_id = os.environ.get("TELEGRAM_CHAT_ID", "")

          # ── Parse Allure summary.json ────────────────────────────
          summary_path = "allure-report/widgets/summary.json"
          stats = {"total": 0, "passed": 0, "failed": 0, "broken": 0, "skipped": 0}
          duration = 0

          if os.path.exists(summary_path):
              with open(summary_path, "r") as f:
                  summary = json.load(f)
              statistic = summary.get("statistic", {})
              stats["total"]   = statistic.get("total",   0)
              stats["passed"]  = statistic.get("passed",  0)
              stats["failed"]  = statistic.get("failed",  0)
              stats["broken"]  = statistic.get("broken",  0)
              stats["skipped"] = statistic.get("skipped", 0)
              duration = summary.get("time", {}).get("duration", 0)
              print(f"✅ summary.json found: {stats}")
          else:
              print(f"⚠️  summary.json NOT found at {summary_path}")

          # ── Build payload ────────────────────────────────────────
          artifact_url = (
              f"https://github.com/{repository}/actions/runs/{run_id}"
          )

          payload = {
              "run_id":           run_id,
              "run_number":       run_number,
              "feature":          feature,
              "status":           "completed",
              "repository":       repository,
              "artifact_url":     artifact_url,
              "telegram_chat_id": telegram_chat_id,
              "statistics": {
                  "total":    stats["total"],
                  "passed":   stats["passed"],
                  "failed":   stats["failed"],
                  "broken":   stats["broken"],
                  "skipped":  stats["skipped"],
                  "duration": duration,
              },
          }

          print(f"📦 Payload: {json.dumps(payload, indent=2)}")

          # ── Kirim ke n8n ─────────────────────────────────────────
          if not n8n_url:
              print("❌ N8N_WEBHOOK_RESULTS_URL is empty! Check your secrets.")
              exit(1)

          body = json.dumps(payload).encode("utf-8")
          req  = urllib.request.Request(
              n8n_url,
              data=body,
              headers={"Content-Type": "application/json"},
              method="POST",
          )

          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  print(f"✅ n8n response: {resp.status} {resp.reason}")
          except urllib.error.HTTPError as e:
              print(f"❌ HTTP Error: {e.code} {e.reason}")
              print(e.read().decode())
              exit(1)
          except urllib.error.URLError as e:
              print(f"❌ URL Error: {e.reason}")
              exit(1)

          EOF
        env:
          FEATURE:                  ${{ env.FEATURE }}
          GITHUB_RUN_ID:            ${{ github.run_id }}
          GITHUB_RUN_NUMBER:        ${{ github.run_number }}
          GITHUB_REPOSITORY:        ${{ github.repository }}
          N8N_WEBHOOK_RESULTS_URL:  ${{ secrets.N8N_WEBHOOK_RESULTS_URL }}
          TELEGRAM_CHAT_ID:         ${{ github.event.client_payload.telegram_chat_id || github.event.inputs.telegram_chat_id || '' }}