name: Playwright Tests

on:
  workflow_dispatch:             # ← Ini yang dipanggil oleh n8n via API
    inputs:
      feature_name:
        description: 'Nama fitur yang akan ditest'
        required: true
        default: 'all'
        type: string

jobs:
  playwright-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: |
          FEATURE="${{ github.event.inputs.feature_name }}"
          if [ "$FEATURE" = "all" ]; then
            npx playwright test
          else
            npx playwright test --grep "@$FEATURE"
          fi
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
        continue-on-error: true   # ← Jangan stop meski ada test fail

      - name: Convert HTML report to PDF
        run: |
          npm install -g playwright-pdf-reporter 2>/dev/null || true
          npx playwright show-report --port 9323 &
          sleep 3
          # Install chromium for PDF generation
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            await page.goto('http://localhost:9323');
            await page.waitForLoadState('networkidle');
            await page.pdf({
              path: 'playwright-report/report.pdf',
              format: 'A4',
              printBackground: true
            });
            await browser.close();
            console.log('PDF generated successfully');
          })();
          "

      - name: Upload PDF report as artifact
        uses: actions/upload-artifact@v4
        if: always()             # ← Upload meski test fail
        with:
          name: playwright-report-pdf
          path: playwright-report/report.pdf
          retention-days: 7

      - name: Upload JSON results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-json
          path: test-results/results.json
          retention-days: 7
          
      - name: Prepare results for n8n
        if: always()
        run: |
          mkdir -p n8n-payload
          # Salin JSON results
          cp test-results/results.json n8n-payload/results.json
          # Buat summary.json ringkas supaya n8n tidak perlu parse besar
          node -e "
            const fs = require('fs');
            const r = JSON.parse(fs.readFileSync('test-results/results.json', 'utf8'));
            const stats = r.stats || {};
            const summary = {
              passed  : stats.expected   || 0,
              failed  : stats.unexpected || 0,
              skipped : stats.skipped    || 0,
              flaky   : stats.flaky      || 0,
              duration: stats.duration   || 0,
              startTime: stats.startTime || new Date().toISOString()
            };
            fs.writeFileSync('n8n-payload/summary.json', JSON.stringify(summary));
            console.log('Summary:', JSON.stringify(summary));
          "

      - name: Upload summary for n8n
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: n8n-summary
          path: n8n-payload/summary.json   # ← file kecil, 1 level, tetap di-ZIP tapi isinya simpel
          retention-days: 3