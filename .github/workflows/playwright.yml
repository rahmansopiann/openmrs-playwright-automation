name: Playwright Tests via n8n Trigger

on:
  workflow_dispatch:             # ← Ini yang dipanggil oleh n8n via API
    inputs:
      feature_name:
        description: 'Nama fitur yang akan ditest'
        required: true
        default: 'all'
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests (filtered by feature)
        run: |
          FEATURE="${{ github.event.client_payload.feature }}"
          echo "Running tests for feature: $FEATURE"
          
          if [ -z "$FEATURE" ] || [ "$FEATURE" = "all" ]; then
            npx playwright test
          else
            npx playwright test --grep "@$FEATURE"
          fi
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          CI: true

      - name: Generate Allure Report
        if: always()
        run: |
          npm run allure:generate
          # Zip the HTML report
          zip -r allure-report.zip allure-report/

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report.zip
          retention-days: 7

      - name: Notify n8n with result
        if: always()
        run: |
          STATUS="${{ job.status }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          FEATURE="${{ github.event.client_payload.feature }}"
          CALLBACK_URL="${{ github.event.client_payload.callback_url }}"
          
          curl -X POST "$CALLBACK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"status\": \"$STATUS\",
              \"feature\": \"$FEATURE\",
              \"run_url\": \"$RUN_URL\",
              \"run_id\": \"${{ github.run_id }}\",
              \"artifact_name\": \"allure-report\"
            }"