name: Playwright Tests with Allure

on:
  workflow_dispatch:
    inputs:
      feature:
        description: 'Feature name (checkout/login/payment/all)'
        required: true
        default: 'all'
        type: string
      telegram_chat_id:
        description: 'Telegram Chat ID (kosongkan jika pakai secret)'
        required: false        # ✅ FIX 1
        default: '0'
        type: string
      requested_by:
        description: 'Name of the person requesting the test run'
        required: false
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Record Job Start Time
        run: echo "JOB_STARTED_AT=$(date -u +'%Y-%m-%dT%H:%M:%S')" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Set & Sanitize Feature Variable
        run: |
          FEATURE="${{ github.event.inputs.feature }}"
          FEATURE=$(echo "$FEATURE" | tr -cd '[:alnum:]_-')
          echo "FEATURE=$FEATURE" >> $GITHUB_ENV
          echo "Running feature: $FEATURE"

      - name: Set Telegram Chat ID
        run: |
          CHAT_ID="${{ github.event.inputs.telegram_chat_id }}"
          if [ -z "$CHAT_ID" ] || [ "$CHAT_ID" = "0" ]; then
            CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}"
          fi
          echo "TELEGRAM_CHAT_ID=$CHAT_ID" >> $GITHUB_ENV
          echo "Chat ID set: $CHAT_ID"

      - name: Run Playwright Tests
        run: |
          mkdir -p allure-results test-results
          if [ "$FEATURE" = "all" ]; then
            npx playwright test
          else
            npx playwright test --grep "@$FEATURE"
          fi
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          CI: true
        continue-on-error: true

      - name: Generate Allure Report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_id }}
          path: allure-results/
          retention-days: 30

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_id }}
          path: allure-report/
          retention-days: 30

      - name: Debug - Check Allure Files
        if: always()
        run: |
          echo "=== FEATURE ==="
          echo "$FEATURE"
          echo "=== summary.json ==="
          cat allure-report/widgets/summary.json 2>/dev/null || echo "❌ Not found"
        env:
          FEATURE: ${{ env.FEATURE }}

      - name: Record Job End Time
        if: always()
        run: echo "JOB_FINISHED_AT=$(date -u +'%Y-%m-%dT%H:%M:%S')" >> $GITHUB_ENV

      - name: Parse Allure & Send to n8n
        if: always()
        run: |
          python3 << 'EOF'
          import json, os, urllib.request, urllib.error

          feature          = os.environ.get("FEATURE", "all")
          run_id           = os.environ.get("GITHUB_RUN_ID", "")
          run_number       = os.environ.get("GITHUB_RUN_NUMBER", "")
          repository       = os.environ.get("GITHUB_REPOSITORY", "")
          n8n_url          = os.environ.get("N8N_WEBHOOK_RESULTS_URL", "")
          telegram_chat_id = os.environ.get("TELEGRAM_CHAT_ID", "")
          job_started_at   = os.environ.get("JOB_STARTED_AT", "")
          job_finished_at  = os.environ.get("JOB_FINISHED_AT", "")

          summary_path = "allure-report/widgets/summary.json"
          stats = {"total": 0, "passed": 0, "failed": 0, "broken": 0, "skipped": 0}
          allure_duration_ms = 0

          if os.path.exists(summary_path):
              with open(summary_path) as f:
                  data = json.load(f)
              s = data.get("statistic", {})
              stats.update({k: s.get(k, 0) for k in stats})
              allure_time        = data.get("time", {})
              allure_start       = allure_time.get("start", 0)
              allure_stop        = allure_time.get("stop", 0)
              allure_duration_ms = allure_time.get("duration", 0)
              print(f"✅ Allure stats: {stats}")
          else:
              print("⚠️  summary.json not found")

          ga_duration_ms = 0
          if job_started_at and job_finished_at:
              from datetime import datetime, timezone
              fmt = "%Y-%m-%dT%H:%M:%S"
              try:
                  start_dt = datetime.strptime(job_started_at, fmt).replace(tzinfo=timezone.utc)
                  end_dt   = datetime.strptime(job_finished_at, fmt).replace(tzinfo=timezone.utc)
                  ga_duration_ms = int((end_dt - start_dt).total_seconds() * 1000)
                  print(f"⏱️  GA duration: {ga_duration_ms}ms")
              except Exception as e:
                  print(f"⚠️  Could not parse GA time: {e}")

          if ga_duration_ms > 0:
              final_duration_ms = ga_duration_ms
              duration_source   = "GitHub Actions"
          elif allure_start > 0 and allure_stop > 0:
              final_duration_ms = allure_stop - allure_start
              duration_source   = "Allure start-stop"
          else:
              final_duration_ms = allure_duration_ms
              duration_source   = "Allure duration field"

          print(f"✅ Duration source: {duration_source} = {final_duration_ms}ms")

          gh_username, gh_repo = repository.split('/')
          allure_url   = f"https://{gh_username}.github.io/{gh_repo}/reports/{run_id}/"
          artifact_url = f"https://github.com/{repository}/actions/runs/{run_id}"

          payload = {
              "run_id":            run_id,
              "run_number":        run_number,
              "feature":           feature,
              "status":            "completed",
              "repository":        repository,
              "artifact_url":      artifact_url,
              "allure_report_url": allure_url,
              "telegram_chat_id":  telegram_chat_id,
              "statistics": {
                  **stats,
                  "duration":        final_duration_ms,
                  "duration_source": duration_source,
              },
          }

          print(json.dumps(payload, indent=2))

          if not n8n_url:
              print("❌ N8N_WEBHOOK_RESULTS_URL kosong!")
              exit(1)

          req = urllib.request.Request(
              n8n_url,
              data=json.dumps(payload).encode(),
              headers={
                  "Content-Type": "application/json",
                  "Accept":       "application/json",
                  "User-Agent":   "GitHubActions/1.0",
              },
              method="POST",
          )
          try:
              with urllib.request.urlopen(req, timeout=30) as r:
                  print(f"✅ Sent to n8n: {r.status}")
          except urllib.error.HTTPError as e:
              print(f"❌ HTTP {e.code}: {e.read().decode()}")
              exit(1)
          except urllib.error.URLError as e:
              print(f"❌ URL Error: {e.reason}")
              exit(1)
          EOF
        env:
          FEATURE:                 ${{ env.FEATURE }}
          GITHUB_RUN_ID:           ${{ github.run_id }}
          GITHUB_RUN_NUMBER:       ${{ github.run_number }}
          GITHUB_REPOSITORY:       ${{ github.repository }}
          N8N_WEBHOOK_RESULTS_URL: ${{ secrets.N8N_WEBHOOK_RESULTS_URL }}
          TELEGRAM_CHAT_ID:        ${{ env.TELEGRAM_CHAT_ID }}   # ✅ FIX 2
          JOB_STARTED_AT:          ${{ env.JOB_STARTED_AT }}
          JOB_FINISHED_AT:         ${{ env.JOB_FINISHED_AT }}

  deploy-allure:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write

    steps:
      - name: Download Allure Report
        uses: actions/download-artifact@v4
        with:
          name: allure-report-${{ github.run_id }}
          path: allure-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: reports/${{ github.run_id }}

      - name: Notify n8n Allure Deploy Done   # ✅ FIX 3
        if: always()
        run: |
          python3 << 'EOF'
          import json, os, urllib.request, urllib.error

          repository = os.environ.get("GITHUB_REPOSITORY", "")
          run_id     = os.environ.get("GITHUB_RUN_ID", "")
          n8n_url    = os.environ.get("N8N_WEBHOOK_RESULTS_URL", "")

          gh_username, gh_repo = repository.split('/')
          allure_url = f"https://{gh_username}.github.io/{gh_repo}/reports/{run_id}/"

          payload = {
            "event":      "allure_deployed",
            "run_id":     run_id,
            "allure_url": allure_url,
          }

          if not n8n_url:
            print("❌ N8N_WEBHOOK_RESULTS_URL kosong!")
            exit(0)  # jangan fail workflow

          req = urllib.request.Request(
            n8n_url,
            data=json.dumps(payload).encode(),
            headers={"Content-Type": "application/json"},
            method="POST",
          )
          try:
            with urllib.request.urlopen(req, timeout=30) as r:
              print(f"✅ Notified n8n: {r.status}")
          except Exception as e:
            print(f"⚠️ Notify failed (non-critical): {e}")
          EOF
        env:
          GITHUB_REPOSITORY:       ${{ github.repository }}
          GITHUB_RUN_ID:           ${{ github.run_id }}
          N8N_WEBHOOK_RESULTS_URL: ${{ secrets.N8N_WEBHOOK_RESULTS_URL }}