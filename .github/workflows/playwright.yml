name: Playwright Tests with Allure

on:
  workflow_dispatch:
    inputs:
      feature:
        description: 'Feature name (checkout/login/payment/all)'
        required: true
        default: 'all'
      telegram_chat_id:
        description: 'Telegram Chat ID for notification'
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Set & Sanitize Feature Variable
        run: |
          FEATURE="${{ github.event.inputs.feature }}"
          FEATURE=$(echo "$FEATURE" | tr -cd '[:alnum:]_-')
          echo "FEATURE=$FEATURE" >> $GITHUB_ENV
          echo "Running feature: $FEATURE"

      - name: Run Playwright Tests
        run: |
          mkdir -p allure-results test-results
          if [ "$FEATURE" = "all" ]; then
            npx playwright test
          else
            npx playwright test --grep "@$FEATURE"
          fi
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          CI: true
        continue-on-error: true

      - name: Generate Allure Report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_id }}
          path: allure-results/
          retention-days: 30

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_id }}
          path: allure-report/
          retention-days: 30

      - name: Debug - Check Allure Files
        if: always()
        run: |
          echo "=== FEATURE ==="
          echo "$FEATURE"
          echo "=== summary.json ==="
          cat allure-report/widgets/summary.json 2>/dev/null || echo "❌ Not found"
        env:
          FEATURE: ${{ env.FEATURE }}

      - name: Parse Allure & Send to n8n
        if: always()
        run: |
          python3 << 'EOF'
          import json, os, urllib.request, urllib.error

          feature          = os.environ.get("FEATURE", "all")
          run_id           = os.environ.get("GITHUB_RUN_ID", "")
          run_number       = os.environ.get("GITHUB_RUN_NUMBER", "")
          repository       = os.environ.get("GITHUB_REPOSITORY", "")
          n8n_url          = os.environ.get("N8N_WEBHOOK_RESULTS_URL", "")
          telegram_chat_id = os.environ.get("TELEGRAM_CHAT_ID", "")

          summary_path = "allure-report/widgets/summary.json"
          stats    = {"total": 0, "passed": 0, "failed": 0, "broken": 0, "skipped": 0}
          duration = 0

          if os.path.exists(summary_path):
              with open(summary_path) as f:
                  data = json.load(f)
              s = data.get("statistic", {})
              stats.update({k: s.get(k, 0) for k in stats})
              duration = data.get("time", {}).get("duration", 0)
              print(f"✅ Parsed: {stats}")
          else:
              print("⚠️  summary.json not found")

          payload = {
              "run_id":           run_id,
              "run_number":       run_number,
              "feature":          feature,
              "status":           "completed",
              "repository":       repository,
              "artifact_url":     f"https://github.com/{repository}/actions/runs/{run_id}",
              "telegram_chat_id": telegram_chat_id,
              "statistics":       {**stats, "duration": duration},
          }

          print(json.dumps(payload, indent=2))

          if not n8n_url:
              print("❌ N8N_WEBHOOK_RESULTS_URL kosong!")
              exit(1)

          req = urllib.request.Request(
              n8n_url,
              data=json.dumps(payload).encode(),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(req, timeout=30) as r:
                  print(f"✅ Sent to n8n: {r.status}")
          except urllib.error.HTTPError as e:
              print(f"❌ HTTP {e.code}: {e.read().decode()}")
              exit(1)
          except urllib.error.URLError as e:
              print(f"❌ URL Error: {e.reason}")
              exit(1)
          EOF
        env:
          FEATURE:                 ${{ env.FEATURE }}
          GITHUB_RUN_ID:           ${{ github.run_id }}
          GITHUB_RUN_NUMBER:       ${{ github.run_number }}
          GITHUB_REPOSITORY:       ${{ github.repository }}
          N8N_WEBHOOK_RESULTS_URL: ${{ secrets.N8N_WEBHOOK_RESULTS_URL }}
          TELEGRAM_CHAT_ID:        ${{ github.event.inputs.telegram_chat_id }}